<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CADS Dashboard</title>

    <link rel="stylesheet" href="../style/default.css" nonce="abc123">
    <link rel="stylesheet" href="../style/dashboard.css" nonce="abc123">
    <link rel="stylesheet" href="../style/tooltip.css" nonce="abc123">

</head>

<body id="wallpaper">
    <div id="body" class="body">
        <div id="page">
            <div id="header">
                <div id="more">
                    <img src="../images/more.png" class="icon" id="more-icon" alt="more">
                </div>
                <div id="page-title">
                    <p>Dashboard</p>
                </div>
                <div id="clock">
                    <span id="hours"></span><span id="colon" class="colon">:</span><span id="minutes"></span>
                </div>
            </div>

            <div id="container">
                <div class="PercentBrowse" id="ChangeColorBaseOnPercent">
                    <div class="TitleChart" id="white">
                        Overall Browsing Status
                    </div>
                    <div class="PercentBrowsing" id="insPercent">
                        <p>0% NaN</p>
                        <img src="../images/nan.png" alt="not a nul">
                    </div>
                </div>
    
                <div class="TotalBrowse">
                    <div class="TitleChart">
                        Total Website Browse
                    </div>
                    <div class="Chart">
                        <div class="TheChart">
                            <div class="DonutChart" id="DonutTotal">
                                <div class="TextInsideDonutChart" id="insTotal">
                                    <p>0</p>
                                </div>
                            </div>
                        </div>
                        <div class="LegendDonutChart">
                            <div class="Indicator"><div class="Color" id="color1"></div><div class="Legend">Safe</div><div class="Amount" id="Amount1">0</div></div>
                            <div class="Indicator"><div class="Color" id="color2"></div><div class="Legend">Risk</div><div class="Amount" id="Amount2">0</div></div>
                        </div>
                    </div>
                </div>
    
                <div class="listBlackOrWhite">
                    <div id="listWhite">
                        <h1>0</h1>
                        <p>Whitelist</p>
                    </div>
                    <div id="listBlack">
                        <h1>0</h1>
                        <p>Blacklist</p>
                    </div>
                </div>
    
                <div class="mostVisitedGraph">
                    <div class="TitleChart">
                        Most Visited Website
                    </div>
                    <div class="hereGraph" id="hereGraph"></div>
                </div>
            </div>
            
            
            

        </div>

        <div id="nav">
            <div id="nav-opt">
                <a href="../ui/home.html" class="top">
                    <div>
                        <img src="../images/home.png" class="icon" alt="home">
                    </div>
                    <div class="name">
                        <p>Home</p>
                    </div>
                </a>
                <a href="../ui/dashboard.html" class="top">
                    <div>
                        <img src="../images/dashboard.png" class="icon" alt="dashboard">
                    </div>
                    <div class="name">
                        <p>Dashboard</p>
                    </div>
                </a>
                <a href="../ui/history.html" class="top">
                    <div>
                        <img src="../images/history.png" class="icon" alt="history">
                    </div>
                    <div class="name">
                        <p>History</p>
                    </div>
                </a>
                <a href="../ui/whitelist.html" class="top">
                    <div>
                        <img src="../images/whitelist.png" class="icon" alt="wwhitelist">
                    </div>
                    <div class="name">
                        <p>Whitelist</p>
                    </div>
                </a>
                <a href="../ui/blacklist.html" class="top">
                    <div>
                        <img src="../images/blacklist.png" class="icon" alt="blacklist">
                    </div>
                    <div class="name">
                        <p>Blacklist</p>
                    </div>
                </a>
                <a href="../ui/report.html" class="top">
                    <div>
                        <img src="../images/report.png" class="icon" alt="report">
                    </div>
                    <div class="name">
                        <p>Report</p>
                    </div>
                </a>
                <a href="../ui/profile.html" class="top">
                    <div>
                        <img src="../images/profile.png" class="icon" alt="profile">
                    </div>
                    <div class="name">
                        <p>Profile</p>
                    </div>
                </a>
                <a href="../ui/setting.html" class="bot">
                    <div>
                        <img src="../images/setting.png" class="icon" alt="setting">
                    </div>
                    <div class="name">
                        <p>Setting</p>
                    </div>
                </a>
                
            </div>
        </div>
    </div>

    <script src="../js/clock.js"></script>
    <script src="../js/slide.js"></script>
    <script src="../js/style.js"></script>
    <script src="../js/setting.js"></script>
    <script src="../js/dashboard.js"></script>
    <script src="../js/tooltip.js"></script>
</body>



</html>
