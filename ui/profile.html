<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CADS Dashboard</title>

    <link rel="stylesheet" href="../style/default.css" nonce="abc123">
    <link rel="stylesheet" href="../style/profile.css" nonce="abc123">
    <link rel="stylesheet" href="../style/loading.css" nonce="abc123">

</head>

<body id="wallpaper">
    <div id="loading-screen" class="hidden"></div>

    <div id="body" class="body">
        <div id="page">
            <div class="head" id="backgroundProfile">
                <div id="profile-header">
                    <div id="more">
                        <img src="../images/more.png" class="icon" id="more-icon" alt="more">
                    </div>
                    <div id="profile-header-title">
                        Profile
                    </div>
                    <div id="edit" class="right-base">
                        <img src="../images/edit.png" id="edit-icon" alt="edit background">
                        <input type="file" id="backgroundInput" accept="image/*" placeholder="Profile Background">
                    </div>
                </div>

                <div class="profile-image" id="profile-image">
                    <label for="imageInput"><div id="profilePreview" class="okchange"></div></label>
                    <input type="file" id="imageInput" accept="image/*" placeholder="Profile Icon">
                </div>
            </div>
            
            
            <div class="profile-body" id="static-profile">
                
                <div class="profile-lists">
                    <div class="profile-button">
                        Status: Not Subscribe
                    </div>
                </div>
                <div class="profile-lists">
                    <div class="profile-button">
                        Name: Test Tester
                    </div>
                </div>
                <div class="profile-lists">
                    <div class="profile-button">
                        Email: test@test@gmail.com
                    </div>
                </div>
                <div class="profile-lists">
                    <div id="panelView">View Panel</div>
                </div>
            </div>


        </div>

        <div id="nav">
            <div id="nav-opt">
                <a href="../ui/home.html" class="top">
                    <div>
                        <img src="../images/home.png" class="icon" alt="home">
                    </div>
                    <div class="name">
                        <p>Home</p>
                    </div>
                </a>
                <a href="../ui/dashboard.html" class="top">
                    <div>
                        <img src="../images/dashboard.png" class="icon" alt="dashboard">
                    </div>
                    <div class="name">
                        <p>Dashboard</p>
                    </div>
                </a>
                <a href="../ui/history.html" class="top">
                    <div>
                        <img src="../images/history.png" class="icon" alt="history">
                    </div>
                    <div class="name">
                        <p>History</p>
                    </div>
                </a>
                <a href="../ui/whitelist.html" class="top">
                    <div>
                        <img src="../images/whitelist.png" class="icon" alt="wwhitelist">
                    </div>
                    <div class="name">
                        <p>Whitelist</p>
                    </div>
                </a>
                <a href="../ui/blacklist.html" class="top">
                    <div>
                        <img src="../images/blacklist.png" class="icon" alt="blacklist">
                    </div>
                    <div class="name">
                        <p>Blacklist</p>
                    </div>
                </a>
                <a href="../ui/report.html" class="top">
                    <div>
                        <img src="../images/report.png" class="icon" alt="report">
                    </div>
                    <div class="name">
                        <p>Report</p>
                    </div>
                </a>
                <a href="../ui/profile.html" class="top">
                    <div>
                        <img src="../images/profile.png" class="icon" alt="profile">
                    </div>
                    <div class="name">
                        <p>Profile</p>
                    </div>
                </a>
                <a href="../ui/setting.html" class="bot">
                    <div>
                        <img src="../images/setting.png" class="icon" alt="setting">
                    </div>
                    <div class="name">
                        <p>Setting</p>
                    </div>
                </a>
                
            </div>
        </div>
        
        
    </div>
    
    <script src="../js/slide.js"></script>
    <script src="../js/style.js"></script>
    <script src="../js/setting.js"></script>
    <script src="../js/profile.js"></script>
    <script src="../js/loading.js"></script>
</body>

</html>
